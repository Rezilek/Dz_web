<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Магазин товаров{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar {
            background-color: #000;
            color: white;
            min-height: 100vh;
            padding: 0;
        }
        .sidebar .nav-link {
            color: white;
            padding: 15px 20px;
            border-bottom: 1px solid #333;
        }
        .sidebar .nav-link:hover {
            background-color: #333;
        }
        .sidebar .nav-link.active {
            background-color: #007bff;
        }
        .main-content {
            padding: 20px;
        }
        .user-section {
            padding: 20px;
            border-bottom: 1px solid #333;
            background-color: #111;
        }
        .menu-header {
            padding: 20px;
            border-bottom: 1px solid #333;
            background-color: #111;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Боковое меню -->
            <div class="col-md-3 col-lg-2 sidebar">
                <div class="menu-header">Меню</div>
                <nav class="nav flex-column">
                    <a class="nav-link {% if page == 'index' %}active{% endif %}" href="/">Главная</a>
                    <a class="nav-link {% if page == 'catalog' %}active{% endif %}" href="/catalog">Каталог</a>
                    <a class="nav-link {% if page == 'category' %}active{% endif %}" href="/category">Категории</a>
                    <a class="nav-link {% if page == 'contacts' %}active{% endif %}" href="/contacts">Контакты</a>
                </nav>

                <div class="user-section">
                    <div class="mb-3">
                        <strong>Пользователь</strong>
                    </div>
                    <div class="nav flex-column">
                        <a class="nav-link" href="#">Профиль</a>
                        <a class="nav-link" href="#">Выход</a>
                    </div>
                </div>
            </div>

            <!-- Основной контент -->
            <div class="col-md-9 col-lg-10 main-content">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
